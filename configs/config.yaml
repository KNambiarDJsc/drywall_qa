# ============================================================
# Drywall QA — SAM ViT-H + DoRA config
# ============================================================

seed: 42

data:
  crack_root: "data/cracks"
  taping_root: "data/drywall_taping"
  processed_root: "dataset"
  val_split: 0.20
  image_size: 768

# ── Model ────────────────────────────────────────────────────
model:
  name: "facebook/sam-vit-huge"
  precision: "fp16"          # RTX 4090 — fp16 faster than bfloat16 on Ada Lovelace
  torch_compile: false

# ── DoRA ─────────────────────────────────────────────────────
dora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  use_dora: true

# ── Training ─────────────────────────────────────────────────
training:
  curriculum:
    - name: "Phase 1 — Taping Only (easy shapes)"
      epochs: 3
      lr: 1.0e-4
      classes: ["taping"]
      image_size: 512
      freeze_encoder: true

    - name: "Phase 2 — Mixed + HEM"
      epochs: 5
      lr: 1.0e-4
      classes: ["crack", "taping"]
      image_size: 768
      freeze_encoder: true
      hem_start_epoch: 2

    - name: "Phase 3 — Precision + unfreeze"
      epochs: 8
      lr: 5.0e-5
      classes: ["crack", "taping"]
      image_size: 768
      freeze_encoder: false
      hem_start_epoch: 0

  batch_size: 4              # RTX 4090 24GB — SAM ViT-H at 768px fits bs=4
  grad_accumulation: 2       # effective batch = 8
  mask_threshold: 0.5
  top_k_masks: 3
  optimizer: "adamw"
  weight_decay: 1.0e-4
  num_workers: 8             # RTX 4090 workstation — 8 workers saturates the GPU

# ── Loss ─────────────────────────────────────────────────────
loss:
  focal_weight: 0.40
  tversky_weight: 0.50
  boundary_weight: 0.10
  tversky_alpha: 0.7
  tversky_beta: 0.3
  focal_alpha: 0.50
  focal_gamma: 2.0

# ── Augmentation ─────────────────────────────────────────────
augmentation:
  crack:
    patch_prob: 0.25
    patch_scale: [0.15, 0.40]
    synthetic_crack_prob: 0.20
  taping:
    patch_prob: 0.70
    patch_scale: [0.20, 0.50]
    synthetic_crack_prob: 0.0

# ── Hard Example Mining ───────────────────────────────────────
hem:
  enabled: true
  dice_threshold: 0.45
  boost_factor: 3.0
  update_every_n_epochs: 1

# ── Sampling weights ─────────────────────────────────────────
class_weights:
  crack: 1.0
  taping: 5.4

# ── Inference ────────────────────────────────────────────────
inference:
  tta_enabled: true
  multiscale: [768, 1024]
  morph_close_crack: true
  morph_kernel_size: 3

# ── Output ───────────────────────────────────────────────────
output:
  checkpoint_dir: "checkpoints"
  mask_dir: "outputs/masks"
  viz_dir: "outputs/visualizations"
  best_metric: "dice"