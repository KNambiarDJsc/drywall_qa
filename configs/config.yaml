# ============================================================
# Drywall QA — Grounded SAM 2 + DoRA
# Text-conditioned segmentation: DINO (frozen) → bbox → SAM 2 (fine-tuned)
# ============================================================

seed: 42

data:
  crack_root: "data/cracks"
  taping_root: "data/drywall_taping"
  processed_root: "dataset"
  val_split: 0.20
  image_size: 768

# ── Text prompts (used by Grounding DINO) ────────────────────
prompts:
  crack:
    - "crack"
    - "wall crack"
    - "surface crack"
    - "hairline crack"
  taping:
    - "taping area"
    - "drywall seam"
    - "joint tape"
    - "wall joint"

# Inference: single best prompt per class
inference_prompts:
  crack: "crack"
  taping: "drywall seam"

# ── Models ───────────────────────────────────────────────────
model:
  grounding_dino: "IDEA-Research/grounding-dino-tiny"   # frozen
  sam2: "facebook/sam2-hiera-large"                      # fine-tuned with DoRA
  precision: "fp16"          # RTX 4090
  torch_compile: false

# ── DoRA (applied to SAM 2 only) ─────────────────────────────
dora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  use_dora: true

# ── Grounding DINO settings ───────────────────────────────────
dino:
  box_threshold: 0.25
  text_threshold: 0.25
  # If DINO finds no box, fall back to full-image box
  fallback_full_image: true

# ── Training ─────────────────────────────────────────────────
training:
  curriculum:
    - name: "Phase 1 — Taping Only (easy shapes)"
      epochs: 3
      lr: 1.0e-4
      classes: ["taping"]
      image_size: 512
      freeze_encoder: true

    - name: "Phase 2 — Mixed + HEM"
      epochs: 5
      lr: 1.0e-4
      classes: ["crack", "taping"]
      image_size: 768
      freeze_encoder: true
      hem_start_epoch: 2

    - name: "Phase 3 — Precision + unfreeze"
      epochs: 8
      lr: 5.0e-5
      classes: ["crack", "taping"]
      image_size: 768
      freeze_encoder: false
      hem_start_epoch: 0

  batch_size: 4
  grad_accumulation: 2       # effective batch = 8
  mask_threshold: 0.5
  optimizer: "adamw"
  weight_decay: 1.0e-4
  num_workers: 8

# ── Loss ─────────────────────────────────────────────────────
loss:
  focal_weight: 0.40
  tversky_weight: 0.50
  boundary_weight: 0.10
  tversky_alpha: 0.7
  tversky_beta: 0.3
  focal_alpha: 0.50
  focal_gamma: 2.0

# ── Augmentation ─────────────────────────────────────────────
augmentation:
  crack:
    patch_prob: 0.25
    patch_scale: [0.15, 0.40]
    synthetic_crack_prob: 0.20
  taping:
    patch_prob: 0.70
    patch_scale: [0.20, 0.50]
    synthetic_crack_prob: 0.0

# ── Hard Example Mining ───────────────────────────────────────
hem:
  enabled: true
  dice_threshold: 0.45
  boost_factor: 3.0

# ── Class weights ─────────────────────────────────────────────
class_weights:
  crack: 1.0
  taping: 5.4

# ── Inference ────────────────────────────────────────────────
inference:
  tta_enabled: true
  multiscale: [768, 1024]
  morph_close_crack: true
  morph_kernel_size: 3

# ── Output ───────────────────────────────────────────────────
output:
  checkpoint_dir: "checkpoints"
  mask_dir: "outputs/masks"
  viz_dir: "outputs/visualizations"